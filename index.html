function inferirPractica(dominio,nivel,patrones){
  if(nivel<150)return "respiracion";
  const txt=(patrones||[]).join(" ").toLowerCase();
  for(const[k,v]of Object.entries(PATRON_A_PRACTICA))if(txt.includes(k))return v;
  return dominio==="ego"?"respiracion":"escaneo";
}

async function llamarIA(sistema,usuario){
  const r=await fetch(WORKER_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      messages:[{role:"system",content:sistema},{role:"user",content:usuario}],
      max_tokens:1200,
      temperature:0.7
    })
  });
  if(!r.ok)throw new Error(`API ${r.status}`);
  const d=await r.json();
  const t=d.choices?.[0]?.message?.content||"";
  if(!t)throw new Error("Respuesta vacía");
  const clean = t.replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
  const match = clean.match(/(\[[\s\S]*\]|\{[\s\S]*\})/);
  if(!match) throw new Error("No se encontró JSON válido en la respuesta");
  return JSON.parse(match[1]);
}

function getNombreHawkins(n){const keys=Object.keys(NOMBRES_HAWKINS).map(Number).sort((a,b)=>a-b);let best=keys[0];for(const k of keys){if(n>=k)best=k;}return NOMBRES_HAWKINS[best];}

function TabEvolucion({setTab}){
  const [evals,setEvals]=useState([]);
  const [periodo,setPeriodo]=useState(7);
  const [chartLoaded,setChartLoaded]=useState(false);
  const canvasRef=useRef(null);
  const chartRef=useRef(null);

  useEffect(()=>{
    (async()=>{
      const data=await sbGet("evaluaciones_conciencia?order=created_at.asc&select=nivel_hawkins,nivel_dominante,created_at&limit=90");
      if(Array.isArray(data)&&data.length>0)setEvals(data.filter(d=>d.nivel_hawkins));
    })();
  },[]);

  useEffect(()=>{
    if(window.Chart){setChartLoaded(true);return;}
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js";
    s.onload=()=>setChartLoaded(true);
    document.head.appendChild(s);
  },[]);

  const getDemoData=()=>{
    const base=[155,148,162,175,170,188,195,200,210,205,220,235,228,245,255,268,260,275,282,278,290,295,305,310,318,312,325,330,340,350];
    const hoy=new Date();
    return base.slice(-periodo).map((v,i)=>{
      const d=new Date(hoy);d.setDate(d.getDate()-(periodo-1-i));
      return{nivel_hawkins:v,created_at:d.toISOString()};
    });
  };

  const getSlice=()=>evals.length===0?getDemoData():evals.slice(-periodo);
  const buildTrend=(vals)=>{
    const n=vals.length;if(n<2)return vals;
    const xm=(n-1)/2,ym=vals.reduce((s,v)=>s+v,0)/n;
    let num=0,den=0;
    vals.forEach((v,i)=>{num+=(i-xm)*(v-ym);den+=(i-xm)**2;});
    const slope=den?num/den:0;
    return vals.map((_,i)=>Math.round(ym+slope*(i-xm)));
  };

  useEffect(()=>{
    if(!chartLoaded||!canvasRef.current)return;
    const slice=getSlice();
    const labels=slice.map(d=>new Date(d.created_at).toLocaleDateString("es-ES",{day:"2-digit",month:"short"}));
    const vals=slice.map(d=>d.nivel_hawkins);
    const trend=buildTrend(vals);
    const ptColors=vals.map(v=>getColorHawkins(v));
    if(chartRef.current)chartRef.current.destroy();
    const plugin200={id:"line200",afterDraw(chart){
      const{ctx,scales:{x,y}}=chart;if(!y)return;
      const yp=y.getPixelForValue(200);
      ctx.save();ctx.setLineDash([4,4]);ctx.strokeStyle="#f87171";ctx.lineWidth=1;ctx.globalAlpha=0.5;
      ctx.beginPath();ctx.moveTo(x.left,yp);ctx.lineTo(x.right,yp);ctx.stroke();
      ctx.setLineDash([]);ctx.globalAlpha=1;ctx.fillStyle="#f87171";ctx.font="10px sans-serif";
      ctx.fillText("200 · Coraje",x.right-72,yp-4);ctx.restore();
    }};
    chartRef.current=new window.Chart(canvasRef.current,{
      type:"line",plugins:[plugin200],
      data:{labels,datasets:[
        {label:"Nivel",data:vals,borderColor:"#7c3aed",backgroundColor:"rgba(124,58,237,0.08)",borderWidth:2,pointBackgroundColor:ptColors,pointBorderColor:ptColors,pointRadius:5,pointHoverRadius:7,tension:0.35,fill:true,order:1},
        {label:"Tendencia",data:trend,borderColor:"#34d399",borderWidth:1.5,borderDash:[5,4],pointRadius:0,tension:0,fill:false,order:2}
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>`${ctx.raw} — ${getNombreHawkins(ctx.raw)}`}}},
        scales:{
          x:{ticks:{color:"rgba(100,116,139,0.8)",font:{size:10},maxTicksLimit:7,autoSkip:true},grid:{color:"rgba(30,41,59,0.6)"}},
          y:{min:80,max:420,ticks:{color:"rgba(100,116,139,0.8)",font:{size:10},stepSize:50},grid:{color:"rgba(30,41,59,0.6)"}}
        }
      }
    });
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[chartLoaded,evals,periodo]);

  const slice=getSlice();
  const vals=slice.map(d=>d.nivel_hawkins);
  const actual=vals[vals.length-1]||0;

          </div>
          <div style={{position:"relative",height:"220px"}}>
            <canvas ref={canvasRef} role="img" aria-label="Gráfico evolución Hawkins"/>
            {!chartLoaded&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontSize:"24px",animation:"pulse 2s infinite",color:"#7c3aed"}}>◎</div></div>}
          </div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"12px",marginTop:"12px",fontSize:"11px",color:"#475569"}}>
            <span style={{display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:"10px",height:"10px",borderRadius:"50%",background:"#7c3aed",display:"inline-block"}}/>Nivel</span>
            <span style={{display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:"14px",height:"2px",background:"#34d399",display:"inline-block"}}/>Tendencia</span>
            <span style={{display:"flex",alignItems:"center",gap:"4px"}}><span style={{width:"10px",height:"2px",background:"#f87171",display:"inline-block"}}/>Umbral 200</span>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"6px",marginBottom:"16px"}}>
          {[
            {nombre:"Sombra",rango:"20–175",color:"#f87171",bg:"rgba(127,29,29,0.2)"},
            {nombre:"Transición",rango:"200–310",color:"#fcd34d",bg:"rgba(120,53,15,0.2)"},
            {nombre:"Expansión",rango:"350–1000",color:"#34d399",bg:"rgba(2,44,34,0.3)"},
          ].map(z=>(
            <div key={z.nombre} style={{background:z.bg,border:`1px solid ${z.color}30`,borderRadius:"10px",padding:"10px"}}>
              <div style={{fontSize:"10px",color:z.color,marginBottom:"2px"}}>{z.nombre}</div>
              <div style={{fontSize:"12px",color:"#94a3b8"}}>{z.rango}</div>
            </div>
          ))}
        </div>
      </div>
      <NavBar tab="evolucion" setTab={setTab}/>
    </div>
  );
}

function MapaCorporal({seleccionada,onSelect}){
  return(
    <div style={{position:"relative",width:"100%",maxWidth:"280px",margin:"0 auto"}}>
      <svg viewBox="0 0 100 100" style={{width:"100%",opacity:0.15,pointerEvents:"none"}}>
        <ellipse cx="50" cy="8" rx="7" ry="8" fill="#8b5cf6"/>
        <rect x="46" y="15" width="8" height="5" fill="#8b5cf6"/>
        <rect x="33" y="20" width="34" height="35" rx="4" fill="#8b5cf6"/>
        <rect x="18" y="21" width="14" height="28" rx="4" fill="#8b5cf6"/>
        <rect x="68" y="21" width="14" height="28" rx="4" fill="#8b5cf6"/>
        <rect x="34" y="55" width="13" height="38" rx="4" fill="#8b5cf6"/>
        <rect x="53" y="55" width="13" height="38" rx="4" fill="#8b5cf6"/>
      </svg>
      {ZONAS.map(z=>(
        <button key={z.id} onClick={()=>onSelect(z.id)} style={{position:"absolute",transform:"translate(-50%,-50%)",left:`${z.x}%`,top:`${z.y}%`,background:"none",border:"none",cursor:"pointer",padding:"4px"}}>
          <div style={{width:seleccionada===z.id?"24px":"16px",height:seleccionada===z.id?"24px":"16px",borderRadius:"50%",border:seleccionada===z.id?"2px solid #a78bfa":"2px solid #475569",background:seleccionada===z.id?"#7c3aed":"rgba(30,41,59,0.8)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",boxShadow:seleccionada===z.id?"0 0 12px rgba(124,58,237,0.6)":"none"}}>
            {seleccionada===z.id&&<div style={{width:"8px",height:"8px",background:"white",borderRadius:"50%"}}/>}
          </div>
        </button>
      ))}
    </div>
  );
}

function AnimRespiracion({fase,progreso}){
  const escala=fase==="inhala"?0.6+progreso*0.4:1-progreso*0.4;
  const color=fase==="inhala"?"#8b5cf6":"#3b82f6";
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"32px 0",gap:"16px"}}>
      <div style={{position:"relative",width:"140px",height:"140px",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{position:"absolute",inset:0,borderRadius:"50%",border:"1px solid rgba(139,92,246,0.2)",animation:"ping 3s ease-out infinite"}}/>
        <div style={{width:"96px",height:"96px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",transform:`scale(${escala})`,background:`radial-gradient(circle, ${color}40, ${color}15)`,border:`2px solid ${color}60`,transition:"transform 0.1s ease-out"}}>
          <span style={{color:"rgba(255,255,255,0.8)",fontSize:"12px",letterSpacing:"0.1em",textTransform:"uppercase"}}>{fase==="inhala"?"Inhala":"Exhala"}</span>
        </div>
      </div>
      <span style={{color:"#475569",fontSize:"12px"}}>5 segundos</span>
    </div>
  );
}

function NavBar({tab,setTab}){
  const items=[{id:"inicio",icon:"◎",label:"Inicio"},{id:"evolucion",icon:"📈",label:"Evolución"},{id:"ancla",icon:"⚓",label:"Ancla"},{id:"historial",icon:"📖",label:"Historial"}];
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(2,6,23,0.97)",borderTop:"1px solid #1e293b",display:"flex",zIndex:40,backdropFilter:"blur(12px)"}}>
      {items.map(i=>(
        <button key={i.id} onClick={()=>setTab(i.id)} style={{flex:1,padding:"10px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px",background:"none",border:"none",cursor:"pointer",color:tab===i.id?"#a78bfa":"#475569",transition:"color 0.2s"}}>
          <span style={{fontSize:"18px",lineHeight:1}}>{i.icon}</span>
          <span style={{fontSize:"11px"}}>{i.label}</span>
        </button>
      ))}
    </div>
  );
}

function BtnDetector({onClick}){
  return(
    <button onClick={onClick} style={{position:"fixed",bottom:"70px",right:"20px",zIndex:40,width:"48px",height:"48px",borderRadius:"50%",background:"#7c3aed",border:"none",cursor:"pointer",fontSize:"20px",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 20px rgba(124,58,237,0.5)"}}>⚡</button>
  );
}

function App(){
  const [tab,setTab]=useState("inicio");
  const [flujo,setFlujo]=useState(null);
  const [tipoEval,setTipoEval]=useState(null);
  const [paso,setPaso]=useState(0);
  const [respuestas,setRespuestas]=useState({});
  const [preguntasDinamicas,setPreguntasDinamicas]=useState([]);
  const [textInput,setTextInput]=useState("");
  const [escala,setEscala]=useState(5);
  const [diagCog,setDiagCog]=useState(null);
  const [detOpen,setDetOpen]=useState(false);
  const [detPaso,setDetPaso]=useState(0);
  const [detResp,setDetResp]=useState({});
  const [detRes,setDetRes]=useState(null);
  const [detLoading,setDetLoading]=useState(false);
  const [zona,setZona]=useState(null);
  const [intEnt,setIntEnt]=useState(5);
  const [cualEnt,setCualEnt]=useState(null);
  const [patronSom,setPatronSom]=useState("");
  const [tipoPrac,setTipoPrac]=useState(null);
  const [faseSom,setFaseSom]=useState("escaneo_entrada");
  const [intSal,setIntSal]=useState(5);
  const [cualSal,setCualSal]=useState(null);
  const [evidIA,setEvidIA]=useState(null);
  const [testimonio,setTestimonio]=useState("");
  const [sesionId,setSesionId]=useState(null);
  const [segs,setSegs]=useState(0);
  const segsRef=useRef(0);
  const [faseResp,setFaseResp]=useState("inhala");
  const [progResp,setProgResp]=useState(0);
  const [ciclos,setCiclos]=useState(0);
  const [pasoEsc,setPasoEsc]=useState(0);
  const timerRef=useRef(null);
  const [leccion,setLeccion]=useState(null);
  const [histData,setHistData]=useState({evals:[],sesiones:[],patrones:[],evidencias:[]});
  const [afirmIdx,setAfirmIdx]=useState(0);
  const [error,setError]=useState(null);
  const [genEv,setGenEv]=useState(false);

  const zonaData=ZONAS.find(z=>z.id===zona);

  // Pregunta actual según flujo
  const getPreguntaActual=()=>{
    if(tipoEval==="situacion"){
      if(paso===0)return{id:"q1",texto:"¿Qué está pasando? Describe en una o dos frases.",tipo:"texto"};
      return preguntasDinamicas[paso-1]||null;
    }
    return PREGUNTAS_DIARIA[paso]||null;
  };
  const getTotalPreguntas=()=>tipoEval==="situacion"?5:PREGUNTAS_DIARIA.length;
  const preguntaActual=getPreguntaActual();
  const totalPreguntas=getTotalPreguntas();

  useEffect(()=>{
    (async()=>{
      const hoy=new Date();
      const dia=Math.floor((hoy-new Date(hoy.getFullYear(),0,0))/86400000);
      const lecs=await sbGet("lecciones_acim?order=numero.asc&select=numero,titulo,frase_dia,instruccion");
      if(Array.isArray(lecs)&&lecs.length>0)setLeccion(lecs[dia%lecs.length]);
    })();
  },[]);

  useEffect(()=>{
    if(flujo!=="somatico"||faseSom!=="practica"||tipoPrac!=="respiracion")return;
    const META=6;let start=Date.now();let c=0;let fa="inhala";
    setFaseResp("inhala");setProgResp(0);setCiclos(0);
    timerRef.current=setInterval(()=>{
      segsRef.current+=0.1;setSegs(Math.floor(segsRef.current));
      const el=Date.now()-start;const pg=Math.min(el/5000,1);setProgResp(pg);
      if(el>=5000){start=Date.now();fa=fa==="inhala"?"exhala":"inhala";setFaseResp(fa);if(fa==="inhala"){c++;setCiclos(c);}if(c>=META){clearInterval(timerRef.current);setTimeout(()=>setFaseSom("escaneo_salida"),800);}}
    },100);
    return()=>clearInterval(timerRef.current);
  },[flujo,faseSom,tipoPrac]);

  useEffect(()=>{
    if(flujo!=="somatico"||faseSom!=="practica"||tipoPrac!=="escaneo")return;
    let cnt=0;setPasoEsc(0);
    timerRef.current=setInterval(()=>{
      segsRef.current+=1;setSegs(segsRef.current);cnt++;
      if(cnt%20===0){const np=Math.floor(cnt/20);if(np>=6){clearInterval(timerRef.current);setTimeout(()=>setFaseSom("escaneo_salida"),800);}else setPasoEsc(np);}
    },1000);
    return()=>clearInterval(timerRef.current);
  },[flujo,faseSom,tipoPrac]);

  const iniciarEval=(tipo)=>{
    setTipoEval(tipo);setPaso(0);setRespuestas({});setTextInput("");setEscala(5);
    setDiagCog(null);setError(null);setPreguntasDinamicas([]);setFlujo("evaluacion");
  };

  const responder=async(v)=>{
    const idActual=tipoEval==="situacion"?(paso===0?"q1":preguntasDinamicas[paso-1]?.id):PREGUNTAS_DIARIA[paso]?.id;
    const n={...respuestas,[idActual]:v};
    setRespuestas(n);setTextInput("");setEscala(5);

    // Situación: después de q1 generar preguntas dinámicas
    if(tipoEval==="situacion"&&paso===0){
      setFlujo("generando_preguntas");
      try{
        const pgs=await generarPreguntasPersonalizadas(v);
        if(!Array.isArray(pgs)||pgs.length===0)throw new Error("No se generaron preguntas");
        setPreguntasDinamicas(pgs);
        setPaso(1);
        setFlujo("evaluacion");
      }catch(e){
        setError("Error generando preguntas: "+e.message);
        setFlujo("error");
      }
      return;
    }

    const esUltima=tipoEval==="situacion"?paso>=4:paso>=PREGUNTAS_DIARIA.length-1;
    if(!esUltima){setPaso(paso+1);}
    else{procesarDiag(n);}
  };

  const procesarDiag=async(resp)=>{
    setFlujo("loading");setError(null);
    try{
      const pats=await sbGet("patrones_acumulados?order=frecuencia.desc&limit=15");
      const pf=Array.isArray(pats)?pats:[];
      const diag=await generarDiagnostico(tipoEval,resp,pf,leccion,false);
      await sbPost("evaluaciones_conciencia",{tipo:tipoEval,situacion_descripcion:resp.q1||null,respuestas:resp,diagnostico:diag.diagnostico,nivel_dominante:diag.nivel_dominante,nivel_hawkins:diag.nivel_hawkins,dominio:diag.dominio,patrones_detectados:diag.patrones_detectados||[],insight_principal:diag.pregunta_ciega,practica_sugerida:diag.practica});
      for(const p of(diag.patrones_detectados||[]))await upsertPatron(p);
      setDiagCog(diag);setFlujo("resultado");
    }catch(e){setError(e.message);setFlujo("error");}
  };

  const irSomatico=(diag)=>{
    const prac=inferirPractica(diag.dominio,diag.nivel_hawkins,diag.patrones_detectados);
    setTipoPrac(prac);setZona(diag.zona_somatica_sugerida||"pecho");
    setPatronSom((diag.patrones_detectados||[]).join(", "));
    setIntEnt(5);setCualEnt(null);setIntSal(5);setCualSal(null);
    setEvidIA(null);setTestimonio("");segsRef.current=0;setSegs(0);
    setFaseSom("escaneo_entrada");setFlujo("somatico");
  };

  const procesarEvidencia=async()=>{
    setGenEv(true);setError(null);
    try{
      const ev=await generarEvidencia({zona:zonaData?.label,cualidad:cualEnt,intensidad:intEnt,patron:patronSom},{cualidad:cualSal,intensidad:intSal},tipoPrac,segs);
      const ses=await sbPost("sesiones_somaticas",{tipo_practica:tipoPrac,zona_cuerpo:zona,intensidad_entrada:intEnt,cualidad_entrada:cualEnt,intensidad_salida:intSal,cualidad_salida:cualSal,cambio_detectado:intSal<intEnt,evidencia_ia:ev.evidencia,duracion_segundos:segs,patron_disuelto:ev.patron_disuelto});
      if(Array.isArray(ses)&&ses[0])setSesionId(ses[0].id);
      setEvidIA(ev);setFaseSom("evidencia");
    }catch(e){setError(e.message);}
    finally{setGenEv(false);}
  };

  const guardarTestimonio=async()=>{
    const hoy=new Date();
    await sbPost("evidencias_corporales",{sesion_id:sesionId,zona,patron:evidIA?.patron_disuelto,testimonio,nivel_antes:intEnt,nivel_despues:intSal,semana:Math.ceil(hoy.getDate()/7),mes:hoy.getMonth()+1});
    setFlujo("completado");
  };

  const cargarHist=async()=>{
    const[ev,ses,pat,evc]=await Promise.all([sbGet("evaluaciones_conciencia?order=created_at.desc&limit=15"),sbGet("sesiones_somaticas?order=created_at.desc&limit=10"),sbGet("patrones_acumulados?order=frecuencia.desc&limit=12"),sbGet("evidencias_corporales?order=created_at.desc&limit=8")]);
    setHistData({evals:Array.isArray(ev)?ev:[],sesiones:Array.isArray(ses)?ses:[],patrones:Array.isArray(pat)?pat:[],evidencias:Array.isArray(evc)?evc:[]});
  };

  useEffect(()=>{if(tab==="historial")cargarHist();},[tab]);

  const abrirDet=()=>{setDetPaso(0);setDetResp({});setDetRes(null);setDetOpen(true);};

  const responderDet=async(v)=>{
    const n={...detResp,[PREGUNTAS_DETECTOR[detPaso].id]:v};setDetResp(n);
    if(detPaso<PREGUNTAS_DETECTOR.length-1){setDetPaso(detPaso+1);}
    else{
      setDetLoading(true);
      try{const pats=await sbGet("patrones_acumulados?order=frecuencia.desc&limit=10");const diag=await generarDiagnostico("detector_rapido",n,Array.isArray(pats)?pats:[],leccion,true);setDetRes(diag);}
      catch(e){setDetRes({error:e.message});}
      finally{setDetLoading(false);}
    }
  };

  const volver=()=>{setFlujo(null);setError(null);};

  function ModalDetector(){
    if(!detOpen)return null;
    const pg=PREGUNTAS_DETECTOR[detPaso];
    return(
      <div style={{position:"fixed",inset:0,zIndex:50,background:"rgba(2,6,23,0.97)",backdropFilter:"blur(12px)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
        <div style={{maxWidth:"360px",width:"100%"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"20px"}}>
            <div><div style={S.label}>Detector rápido ⚡</div><div style={{color:"#475569",fontSize:"12px"}}>¿Ego o Espíritu ahora mismo?</div></div>
            <button onClick={()=>setDetOpen(false)} style={{background:"none",border:"none",color:"#475569",fontSize:"24px",cursor:"pointer",lineHeight:1}}>×</button>
          </div>
          {detLoading?(
            <div style={{textAlign:"center",padding:"40px 0"}}><div style={{fontSize:"32px",animation:"pulse 2s infinite"}}>◎</div><p style={{color:"#475569",fontSize:"12px",marginTop:"12px"}}>Leyendo el campo...</p></div>
          ):detRes?(
            detRes.error?(
              <div><p style={{color:"#f87171",fontSize:"14px",background:"rgba(127,29,29,0.2)",padding:"12px",borderRadius:"12px",marginBottom:"12px"}}>{detRes.error}</p><button onClick={()=>{setDetPaso(0);setDetResp({});setDetRes(null);}} style={{...S.btn,...S.btnSlate}}>Reintentar</button></div>
            ):(
              <div>
                <div style={{textAlign:"center",marginBottom:"16px"}}>
                  <div style={{fontSize:"36px",fontWeight:"300",color:S.nivelColor(detRes.nivel_hawkins)}}>{detRes.nivel_hawkins}</div>
                  <div style={{color:"#94a3b8",fontSize:"14px",marginBottom:"8px"}}>{detRes.nivel_dominante}</div>
                  <span style={S.badge(detRes.dominio)}>{(domCol[detRes.dominio]||domCol.transicion).label}</span>
                </div>
                <div style={{...S.card,marginBottom:"12px"}}><p style={{fontSize:"14px",lineHeight:1.6,color:"#cbd5e1"}}>{detRes.diagnostico}</p></div>
                {detRes.afirmacion&&<div style={{...S.cardViolet,marginBottom:"12px"}}><p style={{fontSize:"14px",fontStyle:"italic",color:"#ede9fe"}}>"{detRes.afirmacion}"</p></div>}
                <div style={{...S.cardEmerald,marginBottom:"12px"}}><div style={{...S.label,color:"#6ee7b7",marginBottom:"6px"}}>Haz esto ahora</div><p style={{fontSize:"14px",color:"#d1fae5"}}>{detRes.practica}</p></div>
                {(detRes.dominio==="ego"||detRes.dominio==="transicion")&&(<button onClick={()=>{setDetOpen(false);irSomatico(detRes);}} style={{...S.btn,...S.btnViolet,marginBottom:"8px"}}>◉ Ir al protocolo somático →</button>)}
                <button onClick={()=>setDetOpen(false)} style={{...S.btn,...S.btnSlate}}>Cerrar</button>
              </div>
            )
          ):(
            <div>
              <div style={{height:"2px",background:"#1e293b",borderRadius:"1px",marginBottom:"20px"}}><div style={{height:"2px",background:"#7c3aed",borderRadius:"1px",width:`${(detPaso/PREGUNTAS_DETECTOR.length)*100}%`,transition:"width 0.3s"}}/></div>
              <p style={{fontSize:"15px",color:"#e2e8f0",lineHeight:1.6,marginBottom:"24px"}}>{pg?.texto}</p>
              <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                {pg?.opciones.map((op,i)=>(<button key={op} onClick={()=>responderDet(op)} style={{...S.btn,textAlign:"left",padding:"14px 16px",background:"rgba(15,23,42,0.6)",border:`1px solid ${i===0?"rgba(185,28,28,0.3)":i===2?"rgba(4,120,87,0.3)":"rgba(51,65,85,0.5)"}`,color:"#cbd5e1",fontSize:"14px"}}>{op}</button>))}
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ── PANTALLAS ──────────────────────────────────────────────────────────────

  if(flujo==="generando_preguntas")return(
    <div style={{...S.screen,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"20px"}}>
      <div style={{fontSize:"48px",animation:"pulse 2s infinite",color:"#a78bfa"}}>◎</div>
      <div style={{textAlign:"center",maxWidth:"260px"}}>
        <p style={{color:"#e2e8f0",fontSize:"15px",lineHeight:1.6,marginBottom:"8px"}}>Leyendo tu situación...</p>
        <p style={{color:"#475569",fontSize:"12px"}}>Preparando preguntas personalizadas · Hawkins · BNE</p>
      </div>
    </div>
  );

  if(flujo==="loading")return(
    <div style={{...S.screen,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"16px"}}>
      <div style={{fontSize:"40px",animation:"pulse 2s infinite",color:"#a78bfa"}}>◎</div>
      <p style={{color:"#475569",fontSize:"12px",letterSpacing:"0.15em",textTransform:"uppercase"}}>Leyendo el campo...</p>
      <p style={{color:"#1e293b",fontSize:"12px"}}>Hawkins · ACIM · BNE</p>
    </div>
  );

  if(flujo==="error")return(
    <div style={{...S.screen,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"20px"}}>
      <div style={{fontSize:"32px"}}>⚠</div>
      <p style={{color:"#f87171",fontSize:"14px",textAlign:"center",maxWidth:"280px"}}>{error}</p>
      <button onClick={volver} style={{...S.btn,...S.btnSlate,maxWidth:"200px"}}>Volver al inicio</button>
    </div>
  );

  if(flujo==="evaluacion"&&preguntaActual){
    const prog=(paso/totalPreguntas)*100;
    return(
      <div style={S.screen}>
        <ModalDetector/><BtnDetector onClick={abrirDet}/>
        <div style={{maxWidth:"440px",margin:"0 auto",paddingTop:"20px"}}>
          <div style={{marginBottom:"28px"}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:"12px",color:"#475569",marginBottom:"6px"}}>
              <span>{tipoEval==="situacion"?"Situación":"Reflexión diaria"}</span>
              <span>{paso+1} / {totalPreguntas}</span>
            </div>
            <div style={{height:"2px",background:"#1e293b",borderRadius:"1px"}}><div style={{height:"2px",background:"#7c3aed",borderRadius:"1px",width:`${prog}%`,transition:"width 0.5s"}}/></div>
            {paso>0&&tipoEval==="situacion"&&<div style={{fontSize:"10px",color:"#7c3aed",textAlign:"center",marginTop:"4px",letterSpacing:"0.08em"}}>Preguntas generadas para tu situación</div>}
          </div>

          <p style={{fontSize:"15px",color:"#e2e8f0",lineHeight:1.6,marginBottom:"28px"}}>{preguntaActual.texto}</p>

          {preguntaActual.tipo==="texto"&&(
            <div>

  );

  if(tab==="historial")return(
    <div style={S.screen}>
      <ModalDetector/><BtnDetector onClick={abrirDet}/>
      <div style={{maxWidth:"360px",margin:"0 auto"}}>
        <div style={{paddingTop:"20px",marginBottom:"20px"}}><h2 style={S.h1}>Historial</h2><p style={{fontSize:"12px",color:"#475569",marginTop:"4px"}}>Cognitivo · Somático · Evidencias</p></div>
        {histData.patrones.length>0&&<div style={{...S.card,marginBottom:"16px"}}><div style={S.label}>Patrones recurrentes</div><div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginTop:"8px"}}>{histData.patrones.map(p=>(<span key={p.patron} style={{fontSize:"12px",background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",padding:"4px 10px",borderRadius:"20px"}}>{p.patron} <span style={{color:"#334155"}}>×{p.frecuencia}</span></span>))}</div></div>}
        {histData.evidencias.length>0&&<div style={{marginBottom:"20px"}}><div style={S.label}>Evidencias corporales</div>{histData.evidencias.map(e=>(<div key={e.id} style={{...S.card,borderColor:"rgba(4,120,87,0.2)"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}><span style={{fontSize:"12px",background:"#1e293b",color:"#64748b",padding:"2px 8px",borderRadius:"10px"}}>{e.zona}</span><span style={{fontSize:"11px",color:"#334155"}}>{formatFecha(e.created_at)}</span></div>{e.patron&&<div style={{fontSize:"12px",color:"#34d399",fontStyle:"italic",marginBottom:"6px"}}>"{e.patron}"</div>}<p style={{fontSize:"13px",color:"#94a3b8",lineHeight:1.5}}>"{e.testimonio}"</p><div style={{fontSize:"11px",color:"#475569",marginTop:"6px"}}>{e.nivel_antes} → <span style={{color:e.nivel_despues<e.nivel_antes?"#34d399":"#fbbf24"}}>{e.nivel_despues}</span></div></div>))}</div>}
        {histData.evals.length>0&&<div style={{marginBottom:"20px"}}><div style={S.label}>Evaluaciones</div>{histData.evals.map(h=>{const dc=domCol[h.dominio]||domCol.transicion;return(<div key={h.id} style={S.card}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}><div><span style={S.badge(h.dominio)}>{dc.label}</span><div style={{fontSize:"24px",fontWeight:"300",color:S.nivelColor(h.nivel_hawkins),marginTop:"6px"}}>{h.nivel_hawkins} <span style={{fontSize:"13px",color:"#64748b"}}>— {h.nivel_dominante}</span></div></div><div style={{fontSize:"11px",color:"#334155"}}>{formatFecha(h.created_at)}</div></div>{h.situacion_descripcion&&<p style={{fontSize:"12px",color:"#475569",fontStyle:"italic",borderLeft:"2px solid #334155",paddingLeft:"10px",marginBottom:"8px"}}>"{h.situacion_descripcion}"</p>}<p style={{fontSize:"13px",color:"#94a3b8",lineHeight:1.5}}>{h.diagnostico}</p>{h.insight_principal&&<p style={{fontSize:"12px",color:"#a78bfa",fontStyle:"italic",borderLeft:"2px solid #4c1d95",paddingLeft:"10px",marginTop:"8px"}}>{h.insight_principal}</p>}{h.patrones_detectados?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:"4px",marginTop:"8px"}}>{h.patrones_detectados.map(p=><span key={p} style={{fontSize:"11px",background:"#1e293b",color:"#475569",padding:"2px 8px",borderRadius:"10px"}}>{p}</span>)}</div>}</div>);})}</div>}
        {!histData.evals.length&&!histData.evidencias.length&&(<div style={{textAlign:"center",padding:"48px 0",color:"#334155",fontSize:"14px"}}>Aún no hay sesiones guardadas.</div>)}
        <button onClick={()=>iniciarEval("situacion")} style={{...S.btn,...S.btnViolet}}>Nueva sesión</button>
      </div>
      <NavBar tab={tab} setTab={setTab}/>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
